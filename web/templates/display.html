{% extends "base.html" %}
{% block content %}
<h1>Display</h1>

<form method="post" id="displayForm">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <h2>Page Delay</h2>
    <div class="form-group">
      <label for="page_delay_seconds">Seconds per page</label>
      <input type="number" id="page_delay_seconds" name="page_delay_seconds"
        value="{{ cfg.page_delay_seconds }}" min="2" max="60" class="narrow">
    </div>
  </div>

  <div class="card">
    <h2>Active Pages</h2>
    <p style="font-size:13px;color:#666;margin-bottom:14px;">Drag to reorder. Uncheck to hide.</p>
    <ul class="page-list" id="pageList">
      {% for page_id in all_in_order %}
        <li class="page-item" draggable="true" data-id="{{ page_id }}">
          <span class="drag-handle">⠿</span>
          <input type="checkbox" name="pages_enabled" value="{{ page_id }}"
            id="page_{{ page_id }}"
            {% if page_id in cfg.pages %}checked{% endif %}>
          <label for="page_{{ page_id }}" style="margin:0;cursor:pointer;flex:1;">
            {{ page_labels[page_id] }}
          </label>
        </li>
      {% endfor %}
    </ul>
    <div id="pageOrderInputs"></div>
  </div>

  <button type="submit" class="btn btn-primary">Save &amp; Restart Display</button>
</form>

<script>
  const list = document.getElementById('pageList');
  let dragging = null;

  list.addEventListener('dragstart', e => {
    dragging = e.target.closest('.page-item');
    setTimeout(() => dragging.style.opacity = '0.4', 0);
  });
  list.addEventListener('dragend', e => {
    dragging.style.opacity = '';
    dragging = null;
    updateOrder();
  });
  list.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.target.closest('.page-item');
    if (target && target !== dragging) {
      const rect = target.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;
      list.insertBefore(dragging, after ? target.nextSibling : target);
    }
  });

  function updateOrder() {
    const container = document.getElementById('pageOrderInputs');
    container.innerHTML = '';
    list.querySelectorAll('.page-item').forEach(item => {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'page_order';
      input.value = item.dataset.id;
      container.appendChild(input);
    });
  }

  // Initialize order inputs on load
  updateOrder();
</script>
{% endblock %}
