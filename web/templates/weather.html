{% extends "base.html" %}
{% block content %}
<h1>Weather</h1>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <h2>Location</h2>
    <div class="form-group">
      <label for="location_name">Display name</label>
      <input type="text" id="location_name" name="location_name" value="{{ cfg.location_name }}">
    </div>
    <div class="form-group">
      <label for="latitude">Latitude</label>
      <input type="text" id="latitude" name="latitude" value="{{ cfg.latitude }}" class="narrow">
    </div>
    <div class="form-group">
      <label for="longitude">Longitude</label>
      <input type="text" id="longitude" name="longitude" value="{{ cfg.longitude }}" class="narrow">
    </div>
  </div>

  <div class="card">
    <h2>Units</h2>
    <div class="form-group">
      <label>Temperature</label>
      <div style="display:flex;gap:16px;align-items:center;margin-top:4px;">
        <label style="display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;">
          <input type="radio" name="use_celsius" value="0" {% if not cfg.get('use_celsius') %}checked{% endif %}> °F — Fahrenheit
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-weight:400;cursor:pointer;">
          <input type="radio" name="use_celsius" value="1" {% if cfg.get('use_celsius') %}checked{% endif %}> °C — Celsius
        </label>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>API</h2>
    <div class="form-group">
      <label for="owm_api_key">OpenWeatherMap API key</label>
      <input type="password" id="owm_api_key" name="owm_api_key" value=""
        placeholder="{{ '••••••••' if has_api_key else 'Enter API key' }}"
        autocomplete="new-password">
      {% if has_api_key %}<p style="font-size:12px;color:#666;margin-top:4px;">Key is set. Enter a new value to replace it.</p>{% endif %}
    </div>
    <div class="form-group">
      <label for="data_refresh_minutes">Refresh interval</label>
      <select name="data_refresh_minutes" id="data_refresh_minutes" style="max-width:150px;">
        {% for m in [15, 30, 60, 120] %}
          <option value="{{ m }}" {% if m == cfg.data_refresh_minutes %}selected{% endif %}>{{ m }} minutes</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <button type="submit" class="btn btn-primary">Save &amp; Restart Display</button>
</form>
{% endblock %}
