{% extends "base.html" %}
{% block content %}
<h1>System</h1>

<div class="card">
  <div class="stat-row">
    <div class="stat">
      <div class="val">
        {% if status == 'active' %}
          <span class="badge badge-green">running</span>
        {% else %}
          <span class="badge badge-red">{{ status }}</span>
        {% endif %}
      </div>
      <div class="lbl">einkdisplay</div>
    </div>
    <div class="stat">
      <div class="val">{{ uptime }}</div>
      <div class="lbl">uptime</div>
    </div>
  </div>

  <form method="post" action="/system/restart">
    <button type="submit" class="btn btn-danger">Restart Display</button>
  </form>
</div>

<div class="card">
  <h2>Recent Logs</h2>
  <pre class="logs">{{ logs }}</pre>
</div>
{% endblock %}
